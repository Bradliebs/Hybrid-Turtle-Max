name: ci

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: phase13-test-nextauth-secret
      CRON_SECRET: phase13-test-cron-secret
      NEXTAUTH_URL: http://localhost:3000
      BROKER_ADAPTER: mock
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Prisma SQLite path exists
        run: mkdir -p prisma && touch prisma/dev.db

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify Phase 13 assets
        run: npm run verify:phase13

      - name: Run unit tests
        run: npm run test:unit

      - name: Build app
        env:
          NODE_ENV: production
        run: npm run build